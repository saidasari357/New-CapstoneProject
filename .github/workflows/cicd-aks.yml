name: Expense Recorder CI/CD (ACR + AKS Blue/Green)

on:
  push:
    branches:
      - main
      - dev1
      - dev2
  workflow_dispatch:

env:
  NAMESPACE: expense-recorder
  IMAGE_TAG: ${{ github.sha }}-${{ github.run_number }}

permissions:
  id-token: write
  contents: read

jobs:
  build_and_scan:
    name: Build, Push, and Scan
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - component: frontend
            context: ./frontend
            dockerfile: ./frontend/Dockerfile
          - component: backend
            context: ./backend
            dockerfile: ./backend/Dockerfile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Login to ACR
        run: az acr login --name ${{ secrets.ACR_NAME }}

      - name: Build and Push ${{ matrix.component }} Image
        env:
          ACR_LOGIN_SERVER: ${{ secrets.ACR_LOGIN_SERVER }}
        run: |
          IMAGE_URI="$ACR_LOGIN_SERVER/expense-${{ matrix.component }}:${IMAGE_TAG}"
          echo "Building $IMAGE_URI"
          docker build -f "${{ matrix.dockerfile }}" -t "$IMAGE_URI" "${{ matrix.context }}"
          docker push "$IMAGE_URI"
          echo "IMAGE_URI=$IMAGE_URI" >> $GITHUB_ENV

      - name: Trivy Scan ${{ matrix.component }} Image
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ${{ env.IMAGE_URI }}
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH

  deploy_blue_green:
    name: Deploy Blue/Green to AKS
    runs-on: ubuntu-latest
    needs: build_and_scan

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Set AKS Context
        uses: azure/aks-set-context@v4
        with:
          resource-group: ${{ secrets.AKS_RESOURCE_GROUP }}
          cluster-name: ${{ secrets.AKS_CLUSTER_NAME }}

      - name: Determine target color
        id: color
        run: |
          kubectl apply -f k8s/base/namespace.yaml
          kubectl apply -f k8s/base/services.yaml

          if kubectl get svc backend-svc -n "$NAMESPACE" >/dev/null 2>&1; then
            CURRENT_COLOR=$(kubectl get svc backend-svc -n "$NAMESPACE" -o jsonpath='{.spec.selector.color}')
          else
            CURRENT_COLOR="green"
          fi

          if [ "$CURRENT_COLOR" = "blue" ]; then
            TARGET_COLOR="green"
          else
            TARGET_COLOR="blue"
          fi

          echo "current=$CURRENT_COLOR" >> $GITHUB_OUTPUT
          echo "target=$TARGET_COLOR" >> $GITHUB_OUTPUT

      - name: Render and apply target-color deployments
        env:
          ACR_LOGIN_SERVER: ${{ secrets.ACR_LOGIN_SERVER }}
          TARGET_COLOR: ${{ steps.color.outputs.target }}
        run: |
          FRONTEND_IMAGE="$ACR_LOGIN_SERVER/expense-frontend:${IMAGE_TAG}"
          BACKEND_IMAGE="$ACR_LOGIN_SERVER/expense-backend:${IMAGE_TAG}"

          sed -e "s|__COLOR__|$TARGET_COLOR|g" -e "s|__IMAGE__|$BACKEND_IMAGE|g" \
            k8s/templates/backend-deployment.yaml > backend.rendered.yaml

          sed -e "s|__COLOR__|$TARGET_COLOR|g" -e "s|__IMAGE__|$FRONTEND_IMAGE|g" \
            k8s/templates/frontend-deployment.yaml > frontend.rendered.yaml

          kubectl apply -f backend.rendered.yaml
          kubectl apply -f frontend.rendered.yaml

      - name: Verify rollout before cutover
        env:
          TARGET_COLOR: ${{ steps.color.outputs.target }}
        run: |
          kubectl rollout status deployment/backend-$TARGET_COLOR -n "$NAMESPACE" --timeout=180s
          kubectl rollout status deployment/frontend-$TARGET_COLOR -n "$NAMESPACE" --timeout=180s

      - name: Smoke test target pods
        env:
          TARGET_COLOR: ${{ steps.color.outputs.target }}
        run: |
          BACKEND_IP=$(kubectl get pod -n "$NAMESPACE" -l app=expense-backend,color=$TARGET_COLOR -o jsonpath='{.items[0].status.podIP}')
          FRONTEND_IP=$(kubectl get pod -n "$NAMESPACE" -l app=expense-frontend,color=$TARGET_COLOR -o jsonpath='{.items[0].status.podIP}')

          kubectl run smoke-backend --rm -i --restart=Never -n "$NAMESPACE" --image=curlimages/curl:8.8.0 -- \
            curl -fsS "http://$BACKEND_IP:8080/api/health"

          kubectl run smoke-frontend --rm -i --restart=Never -n "$NAMESPACE" --image=curlimages/curl:8.8.0 -- \
            curl -fsSI "http://$FRONTEND_IP/"

      - name: Switch services to target color (cutover)
        env:
          TARGET_COLOR: ${{ steps.color.outputs.target }}
        run: |
          kubectl patch svc backend-svc -n "$NAMESPACE" -p '{"spec":{"selector":{"app":"expense-backend","color":"'"$TARGET_COLOR"'"}}}'
          kubectl patch svc frontend-svc -n "$NAMESPACE" -p '{"spec":{"selector":{"app":"expense-frontend","color":"'"$TARGET_COLOR"'"}}}'

      - name: Post-cutover check
        run: kubectl get svc -n "$NAMESPACE" -o wide
