apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-__COLOR__
  namespace: expense-recorder
  labels:
    app: expense-backend
    color: __COLOR__
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: expense-backend
      color: __COLOR__
  template:
    metadata:
      labels:
        app: expense-backend
        color: __COLOR__
    spec:
      serviceAccountName: expense-recorder-sa
      containers:
        - name: backend
          image: __IMAGE__
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 15
