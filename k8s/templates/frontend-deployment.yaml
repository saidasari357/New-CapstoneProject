apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-__COLOR__
  namespace: expense-recorder
  labels:
    app: expense-frontend
    color: __COLOR__
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: expense-frontend
      color: __COLOR__
  template:
    metadata:
      labels:
        app: expense-frontend
        color: __COLOR__
    spec:
      serviceAccountName: expense-recorder-sa
      containers:
        - name: frontend
          image: __IMAGE__
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 15
            periodSeconds: 15
